<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bethel Grill</title>
    <meta name="description" content="Bethel Grill — Commandez vos burgers, pizzas, tacos, desserts et boissons en ligne." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#19B000" />
    <meta property="og:title" content="Bethel Grill - Restaurant en ligne" />
    <meta property="og:description" content="Commandez vos plats préférés en ligne. Livraison rapide." />
    <meta property="og:type" content="website" />
    <link rel="canonical" href="https://bethelgrill.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body { height: 100%; margin: 0; overflow-x: hidden; }
      #root { height: 100%; }

      #loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #FAFAF8;
        font-family: 'Montserrat', sans-serif;
        color: #000000;
      }

      .loading-brand {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 900;
        letter-spacing: 0.06em;
        margin-bottom: 24px;
      }

      .loading-brand .green { color: #19B000; }
      .loading-brand .white { color: #000000; opacity: 0.9; }

      .loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(25, 176, 0, 0.2);
        border-top-color: #19B000;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="loading-brand">
          <span class="green">BETHEL</span>
          <span class="white"> GRILL</span>
        </div>
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
