server {
    listen 80;
    server_name ton-domaine.com www.ton-domaine.com;
    root /chemin/vers/laravel/public;
    index index.php;

    # Fichiers statiques du build
    location /dist/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers uploades
    location /storage/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Assets Laravel
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Filament / Livewire
    location /livewire/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /vendor/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap & robots
    location = /sitemap.xml { try_files $uri $uri/ /index.php?$query_string; }
    location = /robots.txt { try_files $uri $uri/ /index.php?$query_string; }

    # API - pas de cache
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Admin Filament
    location /admin/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Tout le reste -> SPA index.html (via Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Securite
    location ~ /\.(?!well-known) {
        deny all;
    }
}
